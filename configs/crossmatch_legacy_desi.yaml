# Phase 0: cross-match Legacy Surveys images against DESI spectra on sky position.
#
# Catalogs and schema were confirmed against the live HATS catalogs (print(catalog) shows the
# nested schema without downloading). The image catalog is the north-cap self-supervised Legacy
# Surveys imaging, which overlaps DESI EDR; the DR10-south "test" build does NOT overlap DESI EDR.
# Set a Hugging Face token (huggingface-cli login / HF_TOKEN) before running to avoid 504s.

image_catalog:
  # image column is nested<band, flux, psf_fwhm, scale>; image.flux is the per-band (H, W) cutout.
  hats_path: "hf://datasets/UniverseTBD/mmu_ssl_legacysurvey_north"
  ra_column: ra
  dec_column: dec
  object_id_column: object_id
  image_column: image
  image_flux_field: flux         # sub-field of the image struct -> stacked to (n_bands, H, W)

spectrum_catalog:
  # spectrum column is nested<flux, ivar, lsf_sigma, lambda, mask>; redshift is Z, quality is ZWARN.
  hats_path: "hf://datasets/UniverseTBD/mmu_desi_edr_sv3"
  ra_column: ra
  dec_column: dec
  object_id_column: object_id
  spectrum_column: spectrum
  flux_field: flux               # sub-field of the spectrum struct (1-D flux)
  wavelength_field: lambda       # sub-field of the spectrum struct (1-D wavelength)
  redshift_column: Z             # spectroscopic redshift (primary probe target)
  quality_column: ZWARN          # rows where this is truthy (ZWARN != 0) are skipped

match:
  radius_arcsec: 1.0             # standard optical same-object radius; matches the blog example
  n_neighbors: 1

output:
  output_dir: aligned/legacy_desi
  shard_size: 512                # objects per .npz shard
  n_objects: 140000              # full build: takes all ~137.6k good (ZWARN==0) matches. This streams
                                 # ~40 GB from HuggingFace and is not laptop-scale; for a quick trial
                                 # lower it (e.g. 20000). See docs/phase2_findings.md.

split:
  seed: 42
  val_fraction: 0.1
  test_fraction: 0.1
